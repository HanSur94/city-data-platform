id: aalen
display_name: "Aalen (Württemberg)"
country: DE
timezone: Europe/Berlin
bbox:
  lon_min: 9.9700
  lat_min: 48.7600
  lon_max: 10.2200
  lat_max: 48.9000

connectors:
  - connector_class: UBAConnector
    poll_interval_seconds: 3600
    enabled: true
    config:
      station_id: 238
      lat: 48.8360
      lon: 10.0930
      attribution: "Umweltbundesamt (UBA), Datenlizenz Deutschland – Namensnennung – Version 2.0"

  - connector_class: SensorCommunityConnector
    poll_interval_seconds: 300
    enabled: true
    config:
      radius_km: 25
      attribution: "Sensor.community, CC BY-SA 4.0"

  - connector_class: WeatherConnector
    poll_interval_seconds: 3600
    enabled: true
    config:
      lat: 48.8400
      lon: 10.0900
      attribution: "Deutscher Wetterdienst (DWD) via Bright Sky, CC BY 4.0"

  - connector_class: GTFSConnector
    poll_interval_seconds: 604800
    enabled: true
    config:
      gtfs_url: "https://www.nvbw.de/fileadmin/user_upload/service/open_data/fahrplandaten_mit_liniennetz/oam.zip"
      gtfs_url_fallback: "https://download.gtfs.de/germany/free/latest.zip"
      attribution: "OstalbMobil (NVBW), DL-DE-BY-2.0 / Shapes © OpenStreetMap contributors"

  - connector_class: GTFSRealtimeConnector
    poll_interval_seconds: 30
    enabled: true
    config:
      gtfs_rt_url: "https://realtime.gtfs.de/realtime-free.pb"
      attribution: "NVBW - Nahverkehrsgesellschaft Baden-Württemberg mbH, CC BY-SA 4.0"

  - connector_class: PegelonlineConnector
    poll_interval_seconds: 900
    enabled: true
    config:
      # WATR-01: Neckar federal gauging stations near Aalen (via PEGELONLINE).
      # NOTE WATR-02: Kocher is a Baden-Württemberg state river — not in PEGELONLINE
      # (federal waterways only). HVZ BW has no public machine-readable API.
      # Scope for WATR-02 is therefore the closest available federal stations on Neckar.
      # station_uuids: [] means fetch all Neckar stations dynamically at runtime.
      station_uuids: []
      attribution: "PEGELONLINE (WSV / BfG), Datenlizenz Deutschland – Zero – Version 2.0"

  - connector_class: LubwWfsConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      # WATR-05: LUBW WFS environmental layers — Naturschutzgebiet + Wasserschutzgebiet
      # Uses town bbox (9.97,48.76,10.22,48.90) from town config automatically.
      attribution: "Landesanstalt für Umwelt Baden-Württemberg (LUBW), DL-DE-BY-2.0"

  - connector_class: BastConnector
    poll_interval_seconds: 3600
    enabled: true
    config:
      attribution: "BASt (Bundesanstalt fuer Strassenwesen), DL-DE-Zero-2.0"

  - connector_class: LhpConnector
    poll_interval_seconds: 900
    enabled: true
    config:
      ident: "BW_13490006"
      lat: 48.8035
      lon: 10.0972
      attribution: "Hochwasserportal (LHP), Datenlizenz Deutschland"

  - connector_class: TomTomConnector
    poll_interval_seconds: 600
    enabled: true
    config:
      api_key: "${TOMTOM_API_KEY}"
      attribution: "TomTom Traffic Flow API"

  - connector_class: AutobahnConnector
    poll_interval_seconds: 300
    enabled: true
    config:
      roads: ["A7", "A6"]
      attribution: "Autobahn GmbH des Bundes, DL-DE-Zero-2.0"

  - connector_class: MobiDataBWConnector
    poll_interval_seconds: 3600
    enabled: true
    config:
      attribution: "MobiData BW, DL-DE-BY-2.0"

  - connector_class: SmardConnector
    poll_interval_seconds: 900
    enabled: true
    config:
      attribution: "SMARD (Bundesnetzagentur), DL-DE-Zero-2.0"

  - connector_class: MastrConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      landkreis: "Ostalbkreis"
      attribution: "Marktstammdatenregister (BNetzA), DL-DE-Zero-2.0"

  - connector_class: OverpassCommunityConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      attribution: "OpenStreetMap contributors, ODbL"

  - connector_class: OverpassRoadworksConnector
    poll_interval_seconds: 3600
    enabled: true
    config:
      attribution: "OpenStreetMap contributors, ODbL"

  # Replaced by EvChargingConnector (Phase 16) for live status
  - connector_class: LadesaeulenConnector
    poll_interval_seconds: 86400
    enabled: false
    config:
      kreis_filter: "Ostalbkreis"
      attribution: "Bundesnetzagentur, CC BY 4.0"

  - connector_class: SolarPotentialConnector
    poll_interval_seconds: 86400
    enabled: false
    config:
      wms_url: ""
      attribution: "LUBW Baden-Wuerttemberg"

  - connector_class: BusInterpolationConnector
    poll_interval_seconds: 30
    enabled: true
    config:
      gtfs_url: "https://www.nvbw.de/fileadmin/user_upload/service/open_data/fahrplandaten_mit_liniennetz/oam.zip"
      gtfs_url_fallback: "https://download.gtfs.de/germany/free/latest.zip"
      attribution: "OstalbMobil (NVBW) via GTFS schedule interpolation, Shapes © OpenStreetMap contributors"

  - connector_class: AirQualityGridConnector
    poll_interval_seconds: 300
    enabled: true
    config:
      grid_step_deg: 0.005
      attribution: "IDW interpolation from UBA + Sensor.community"

  - connector_class: ParkingConnector
    poll_interval_seconds: 300
    enabled: true
    config:
      url: "https://www.sw-aalen.de/privatkunden/dienstleistungen/parken/parkhausbelegung"
      attribution: "Stadtwerke Aalen, scraping"

  # --- Demographics connectors (DEMO-01 through DEMO-04) ---
  # Daily refresh — demographic data changes slowly.

  - connector_class: WegweiserKommuneConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      ags: "08136088"
      attribution: "Wegweiser Kommune (Bertelsmann Stiftung), CC0"

  - connector_class: StatistikBWConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      ags: "08136088"
      attribution: "Statistisches Landesamt Baden-Wuerttemberg, DL-DE-BY-2.0"

  - connector_class: ZensusConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      ags: "08136088"
      wms_url: "https://atlas.zensus2022.de/geoserver/ows"
      attribution: "Statistisches Bundesamt, Zensus 2022, DL-DE-BY-2.0"

  - connector_class: BundesagenturConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      ags: "08136"
      attribution: "Bundesagentur fuer Arbeit, DL-DE-Zero-2.0"

  # --- Phase 16: Solar production + EV charging live status ---

  - connector_class: SolarProductionConnector
    poll_interval_seconds: 900
    enabled: true
    config:
      lat: 48.8400
      lon: 10.0900
      attribution: "Computed from MaStR capacity x Bright Sky irradiance"

  - connector_class: EvChargingConnector
    poll_interval_seconds: 300
    enabled: true
    config:
      radius_km: 15
      attribution: "MobiData BW OCPDB, open data"

  # --- Phase 17: Static layers (heat demand + cycling infrastructure) ---

  - connector_class: HeatDemandConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      attribution: "KEA-BW Waermeatlas (simulated)"

  - connector_class: CyclingInfraConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      attribution: "OpenStreetMap contributors, ODbL"

  - connector_class: OsmBuildingsConnector
    poll_interval_seconds: 86400
    enabled: true
    config:
      attribution: "OpenStreetMap contributors, ODbL"

  # --- Backlog 999.4: Police reports ---

  - connector_class: PoliceConnector
    poll_interval_seconds: 1800
    enabled: true
    config:
      rss_url: "https://www.presseportal.de/rss/dienststelle_110969.rss2"
      max_age_days: 7
      attribution: "Polizeipraesidium Aalen via Presseportal.de"
